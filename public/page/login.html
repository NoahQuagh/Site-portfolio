<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GigaBot — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet">
  <link rel="stylesheet" href="../style/styleDocBot.css">
  <link rel="stylesheet" href="../style/stylePalette.css">
  <link rel="stylesheet" href="../style/styleLogin.css">
</head>
<body class="login-page">

<div class="login-visual">
  <div class="logo">
    <span class="logo-text">GB</span>
  </div>
</div>

<div class="login-container">
  <div class="login-header">
    <h1>Connexion</h1>
    <p>// Accès au terminal de contrôle</p>
  </div>

  <form>
    <div class="form-group">
      <label for="email">Identifiant</label>
      <input type="text" id="email" placeholder="Nom d'utilisateur" required>
    </div>

    <div class="form-group">
      <label for="password">Clé d'accès</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn-login">Initialiser la session</button>
  </form>

  <div class="login-footer">
    Mot de passe oublié ? <a href="#">Demander un reset</a>
  </div>
</div>
</body>
</html>
